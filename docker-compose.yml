version: '3.8'

services:
  client :
      # On définit une image de Node.js comme base en indiquant la version utilisée
      container_name : Client
      image: node:20-alpine

      # Créez un répertoire de travail dans le conteneur et définir l'utilisateur comme node
      working_dir: /client

      # Définir le volume client en tant que dossier de travail
      volumes:
        - ./client:/client

      # Liaison entre le port 3000 de la machine et le port 3000 du conteneur  
      ports:
        - "3000:3000"

      # Lancement du script "npm run dev" pour démarrer l'application
      command: ["npm","run", "dev"]
      user: node
      environment:
        - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}    
      depends_on:
        - db

  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: