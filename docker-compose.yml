
services:
  client :
      # On définit une image de Node.js comme base en indiquant la version utilisée
      container_name : Client
      build:
        context: ./client
        dockerfile: ./client/dockerfile.client

      # commande a executer avant de lancer le serveur
      # RUN npm install

      # Lancement du script "npm run dev" pour démarrer l'application
      # command : ["npm","run", "dev"]
      volumes:
        - ./client:/client
        - /client/node_modules
      command: npm run dev
      user: node
      environment:
        - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}    
      depends_on:
        - db

  db:
    container_name: database
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    
    volumes:
      - ./database/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

